name: Build Windows EXE

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g. 1.1.0)'
        required: true
        default: '1.0.0'
      description:
        description: 'What changed in this version'
        required: false
        default: 'No description provided'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyinstaller pythonnet

      - name: Download LibreHardwareMonitor DLL
        run: |
          $release = Invoke-RestMethod -Uri "https://api.github.com/repos/LibreHardwareMonitor/LibreHardwareMonitor/releases/latest"
          $asset = $release.assets | Where-Object { $_.name -like "*net472*" }
          Invoke-WebRequest -Uri $asset.browser_download_url -OutFile "lhm.zip"
          Expand-Archive -Path "lhm.zip" -DestinationPath "lhm_files"
          Copy-Item "lhm_files\LibreHardwareMonitorLib.dll" "."

      - name: Build standalone EXE
        run: |
          pyinstaller `
            --onefile `
            --windowed `
            --name "MonitorManager" `
            --uac-admin `
            --add-binary "LibreHardwareMonitorLib.dll;." `
            monitor_manager.py

      - name: Upload artifact (auto build)
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: MonitorManager-${{ github.sha }}
          path: dist/MonitorManager.exe
          retention-days: 30

      - name: Create GitHub Release
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ inputs.version }}" `
            --title "Monitor Manager v${{ inputs.version }}" `
            --notes "${{ inputs.description }}" `
            dist/MonitorManager.exe#MonitorManager-v${{ inputs.version }}.exe
