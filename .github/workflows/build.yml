name: Build Windows EXE

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g. 1.1.0)'
        required: true
        default: '1.0.0'
      description:
        description: 'What changed in this version'
        required: false
        default: 'No description provided'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyInstaller and dependencies
        run: pip install pyinstaller pystray Pillow

      - name: Build TempReader (C# / LHM)
        run: |
          cd tempreader
          dotnet publish -c Release --framework net472 -o ../tempreader_out

      - name: Generate app icon
        run: python create_icon.py

      - name: Build standalone EXE
        run: >
          pyinstaller
          --onefile
          --windowed
          --name "MonitorManager"
          --uac-admin
          --icon icon.ico
          --add-data "tempreader_out;tempreader"
          monitor_manager.py

      - name: Upload artifact (auto build)
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: MonitorManager-${{ github.sha }}
          path: dist/MonitorManager.exe
          retention-days: 30

      - name: Create GitHub Release
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ inputs.version }}" `
            --title "Monitor Manager v${{ inputs.version }}" `
            --notes "${{ inputs.description }}" `
            dist/MonitorManager.exe#MonitorManager-v${{ inputs.version }}.exe
